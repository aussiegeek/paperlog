name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          cache: true

      - run: pnpm test
      - run: pnpm lint:check
      - run: pnpm prettier:check
